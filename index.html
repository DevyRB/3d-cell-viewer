<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Viewer 2D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:#070714;overflow:hidden;color:#fff;user-select:none
}
canvas{display:block;width:100vw;height:100vh;cursor:pointer}
.top-bar{
  position:fixed;top:0;left:0;width:100%;z-index:20;pointer-events:none;
  padding:14px 22px;
  background:linear-gradient(180deg,rgba(7,7,20,0.85) 0%,transparent 100%);
}
.top-bar>*{pointer-events:auto}
.top-bar h1{
  font-size:20px;font-weight:700;display:inline;margin-right:26px;
  background:linear-gradient(135deg,#8ab4ff,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.tab-btn{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  color:rgba(255,255,255,0.4);padding:6px 18px;border-radius:18px;
  cursor:pointer;font-size:13px;transition:.25s;margin-right:6px;font-weight:500
}
.tab-btn:hover{background:rgba(255,255,255,0.08);color:#fff}
.tab-btn.active{
  background:linear-gradient(135deg,#4a7cf7,#6c63ff);border-color:transparent;color:#fff;
  box-shadow:0 4px 20px rgba(74,124,247,0.25)
}
.info-panel{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:20;
  background:rgba(10,10,30,0.92);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.05);border-radius:14px;
  padding:12px 22px;max-width:480px;width:calc(100%-40px);text-align:center;
  pointer-events:none;transition:all .4s cubic-bezier(.4,0,.2,1)
}
.info-panel .hint{font-size:12px;color:rgba(255,255,255,0.18)}
.info-panel .hint span{display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
.info-panel .name{font-size:17px;font-weight:600;margin-bottom:2px}
.info-panel .desc{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.5}
@media(max-width:600px){
  .top-bar{padding:10px 14px}
  .top-bar h1{font-size:15px;display:block;margin-bottom:4px}
  .tab-btn{font-size:11px;padding:4px 12px}
}
</style>
</head>
<body>
<div class="top-bar">
  <h1>✦ Cell Viewer</h1>
  <button class="tab-btn active" data-cell="animal">Animal</button>
  <button class="tab-btn" data-cell="plant">Plant</button>
  <button class="tab-btn" data-cell="prokaryote">Prokaryote</button>
</div>
<div class="info-panel" id="panel">
  <div class="hint" id="hint"><span>👆</span> คลิกที่ออร์แกเนลล์</div>
  <div class="name" id="pname"></div>
  <div class="desc" id="pdesc"></div>
</div>
<canvas id="c"></canvas>

<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
let W,H, s;

function resize(){
  W=window.innerWidth; H=window.innerHeight;
  const dpr=devicePixelRatio||1;
  c.width=W*dpr; c.height=H*dpr;
  c.style.width=W+'px'; c.style.height=H+'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr,dpr);
  s=Math.min(W,H)/18;
  rebuild=true;
}
window.addEventListener('resize',resize);

// ─── Info ───────────────────────────────────────────────
const INFO={
  membrane:['Cell Membrane','เยื่อหุ้มเซลล์ — เยื่อเลือกผ่านควบคุมการเข้าออกของสาร','#60a5fa'],
  wall:['Cell Wall','ผนังเซลล์ — โครงสร้างแข็งนอกเยื่อหุ้ม ให้ความแข็งแรง','#a16207'],
  capsule:['Capsule','แคปซูล — ชั้นเมือกหนาหุ้มแบคทีเรีย ป้องกันและยึดเกาะ','#7dd3fc'],
  nucleus:['Nucleus','นิวเคลียส — ศูนย์กลางควบคุมเซลล์ บรรจุ DNA','#a78bfa'],
  nucleolus:['Nucleolus','นิวคลีโอลัส — สร้างไรโบโซม อยู่ภายในนิวเคลียส','#7c3aed'],
  mito:['Mitochondrion','ไมโทคอนเดรีย — แหล่งสร้างพลังงาน ATP','#34d399'],
  chloro:['Chloroplast','คลอโรพลาสต์ — แหล่งสังเคราะห์ด้วยแสง มีคลอโรฟิลล์','#22c55e'],
  rer:['Rough ER','ER แบบขรุขระ — สังเคราะห์โปรตีน มีไรโบโซมเกาะ','#818cf8'],
  ser:['Smooth ER','ER แบบเรียบ — สังเคราะห์ไขมันและขับสารพิษ','#7dd3fc'],
  golgi:['Golgi Apparatus','กอลจิ — แปรรูปและบรรจุโปรตีนส่งออก','#fbbf24'],
  ribo:['Ribosome','ไรโบโซม — สร้างโปรตีนจากกรดอะมิโน','#fde68a'],
  lyso:['Lysosome','ไลโซโซม — ย่อยสลายของเสียและสิ่งแปลกปลอม','#f87171'],
  vac:['Vacuole','แวคิวโอล — เก็บน้ำและสารต่างๆ พืชมีขนาดใหญ่','#7dd3fc'],
  centro:['Centrosome','เซนโทรโซม — ช่วยในการแบ่งเซลล์','#fb923c'],
  nucleoid:['Nucleoid','นิวคลีออยด์ — DNA วงกลมในโพรคาริโอต ไม่มีเยื่อหุ้ม','#67e8f9'],
  plasmid:['Plasmid','พลาสมิด — DNA วงกลมเล็กๆ นอกโครโมโซม','#6ee7b7'],
  flag:['Flagellum','แฟลเจลลัม — หางใช้เคลื่อนที่ของแบคทีเรีย','#d4d4d8'],
  pilus:['Pilus','ไพลัส — ขนเล็กๆ ใช้ยึดเกาะและถ่ายโอน DNA','#a8a29e'],
};

// ─── State ──────────────────────────────────────────────
let currentType='animal';
let orgs=[];
let selected=null;
let rebuild=true;
let ribosomes=[];

// ─── Drawing helpers (use global W,H,s) ─────────────────
function glow(x,y,r,color,alpha=.12,blur=18){
  ctx.save();
  ctx.shadowColor=color; ctx.shadowBlur=blur;
  ctx.fillStyle=color; ctx.globalAlpha=alpha;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function gradCircle(x,y,r,c1,c2){
  const g=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);
  g.addColorStop(0,c1); g.addColorStop(1,c2||c1);
  return g;
}

function disc(x,y,r,c1,c2){
  glow(x,y,r,c2||c1,.1,14);
  ctx.save();
  ctx.fillStyle=gradCircle(x,y,r,c1,c2||c1);
  ctx.shadowColor='rgba(0,0,0,.25)'; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // highlight
  ctx.save();
  const hg=ctx.createRadialGradient(x-r*.2,y-r*.2,0,x,y,r*.5);
  hg.addColorStop(0,'rgba(255,255,255,.2)');
  hg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.arc(x,y,r*.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function pill(x,y,w,h,c1,c2){
  const rr=h/2;
  ctx.save();
  const g=ctx.createLinearGradient(x-w/2,y,x+w/2,y);
  g.addColorStop(0,c1); g.addColorStop(1,c2||c1);
  ctx.fillStyle=g;
  ctx.shadowColor='rgba(0,0,0,.2)'; ctx.shadowBlur=5;
  ctx.beginPath(); ctx.ellipse(x,y,w/2,h/2,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─── Org class (stores relative coords) ─────────────────
class Org{
  constructor(id,rx,ry,drawFn,hitR){
    this.id=id; this.rx=rx; this.ry=ry; this.draw=drawFn; this.hitR=hitR;
  }
  x(){return W/2+this.rx*s}
  y(){return H/2-10+this.ry*s}
  hit(mx,my){
    const dx=mx-this.x(), dy=my-this.y();
    return dx*dx+dy*dy <= (this.hitR*s)*(this.hitR*s);
  }
}

// ─── Background ─────────────────────────────────────────
let parts=[];
function initParts(){
  parts=[];
  for(let i=0;i<60;i++) parts.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.2+.5,a:Math.random()*.2+.03});
}
initParts();

function drawBg(){
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
  g.addColorStop(0,'#0f0f2a'); g.addColorStop(.5,'#08081a'); g.addColorStop(1,'#04040c');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(const p of parts){
    p.x+=p.vx/W; p.y+=p.vy/H;
    if(p.x<0||p.x>1)p.vx*=-1; if(p.y<0||p.y>1)p.vy*=-1;
    ctx.fillStyle=`rgba(255,255,255,${p.a})`;
    ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2); ctx.fill();
  }
}

// ─── Animal ─────────────────────────────────────────────
function buildAnimal(){
  orgs=[];
  const cx=W/2, cy=H/2-10;
  const sc=s;
  const O=(id,rx,ry,rr,c1,c2)=>orgs.push(new Org(id,rx,ry,()=>disc(cx+rx*sc,cy+ry*sc,rr*sc,c1,c2),rr));

  orgs.push(new Org('membrane',0,0,()=>{
    glow(cx,cy,5.2*sc,'#4488cc',.04,25);
    ctx.save();
    ctx.strokeStyle='rgba(68,136,204,.15)'; ctx.lineWidth=1.5;
    ctx.setLineDash([4*sc,6*sc]);
    ctx.beginPath(); ctx.arc(cx,cy,5*sc,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  },5.5));

  O('nucleus',.2,.4,1.35,'#8b5cf6','#6d28d9');
  O('nucleolus',.5,.6,.4,'#7c3aed','#581c87');

  // Mito
  const mits=[[2.5,1.0,.35],[3.0,-1.2,.3],[-1.5,2.8,.3],[3.2,.5,.35],[-3.0,-1.5,.28],[-.5,-3.0,.3],[1.8,-2.5,.32]];
  for(const [mx,my,mr] of mits)
    orgs.push(new Org('mito',mx,my,()=>pill(cx+mx*sc,cy+my*sc,.8*sc,.22*sc,'#34d399','#059669'),mr));

  // RER
  const rers=[[1.2,1.5],[2.0,-.5],[-1.0,1.8],[-1.8,-1.2],[2.5,1.8],[-2.0,-2.0],[1.5,-1.8],[.5,2.5],[.8,-2.2]];
  for(const [rx,ry] of rers){
    orgs.push(new Org('rer',rx,ry,()=>{
      const px=cx+rx*sc, py=cy+ry*sc;
      ctx.save();
      const g2=ctx.createLinearGradient(px,py-.06*sc,px,py+.06*sc);
      g2.addColorStop(0,'#818cf8'); g2.addColorStop(1,'#6366f1');
      ctx.fillStyle=g2; ctx.shadowColor='rgba(129,140,248,.12)'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.ellipse(px,py,.35*sc,.05*sc,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
      for(let j=0;j<3;j++){
        ctx.fillStyle='rgba(253,230,138,.4)';
        ctx.beginPath(); ctx.arc(px+(Math.random()-.5)*.6*sc,py+(Math.random()-.5)*.06*sc,1.5,0,Math.PI*2); ctx.fill();
      }
    },.2));
  }

  // SER
  const sers=[[2.8,-.2],[-2.5,1.2],[1.0,-2.2],[-1.2,-2.5],[-2.8,-.8],[2.2,2.5]];
  for(const [sx,sy] of sers){
    orgs.push(new Org('ser',sx,sy,()=>{
      const px=cx+sx*sc, py=cy+sy*sc;
      ctx.save();
      ctx.strokeStyle='rgba(125,211,252,.35)'; ctx.lineWidth=2; ctx.shadowColor='rgba(125,211,252,.08)'; ctx.shadowBlur=5;
      ctx.beginPath(); ctx.arc(px,py,.2*sc,0,Math.PI*1.6); ctx.stroke();
      ctx.restore();
    },.22));
  }

  // Golgi
  for(let i=0;i<5;i++){
    const px=cx-.5*sc, py=cy+(1.2-i*.18)*sc, w=(.55-i*.035)*sc;
    orgs.push(new Org('golgi',-.5,1.2-i*.18,()=>{
      ctx.save();
      const g2=ctx.createLinearGradient(px,py-w*.1,px,py+w*.1);
      g2.addColorStop(0,'#fbbf24'); g2.addColorStop(1,'#d97706');
      ctx.fillStyle=g2; ctx.shadowColor='rgba(251,191,36,.1)'; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.ellipse(px,py,w/2,w*.08,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    },.15));
  }

  // Lysosomes
  for(let i=0;i<3;i++){
    const a=Math.random()*Math.PI*2, rr=.12+.04*Math.random();
    const lx=(3.2+Math.random()*.4)*(Math.random()>.5?1:-1);
    const ly=(Math.random()-.5)*2;
    orgs.push(new Org('lyso',lx,ly,()=>disc(cx+lx*sc,cy+ly*sc,rr*sc,'#f87171','#dc2626'),rr));
  }

  // Centrosome
  orgs.push(new Org('centro',-1.8,-1.2,()=>{
    const px=cx-1.8*sc, py=cy-1.2*sc;
    ctx.save();
    ctx.strokeStyle='#fb923c'; ctx.lineWidth=2; ctx.shadowColor='rgba(251,146,60,.15)'; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.moveTo(px-.2*sc,py); ctx.lineTo(px+.2*sc,py); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px,py-.2*sc); ctx.lineTo(px,py+.2*sc); ctx.stroke();
    ctx.restore();
  },.25));

  // Free ribosomes
  ribosomes=[];
  for(let i=0;i<25;i++){
    const th=Math.acos(Math.random()*2-1), ph=Math.random()*Math.PI*2;
    const r=1.5+Math.random()*3;
    ribosomes.push([Math.sin(th)*Math.cos(ph)*r, Math.sin(th)*Math.sin(ph)*r]);
  }
}

// ─── Plant ──────────────────────────────────────────────
function buildPlant(){
  orgs=[];
  const cx=W/2, cy=H/2-10, sc=s;
  const O=(id,rx,ry,rr,c1,c2)=>orgs.push(new Org(id,rx,ry,()=>disc(cx+rx*sc,cy+ry*sc,rr*sc,c1,c2),rr));

  orgs.push(new Org('wall',0,0,()=>{
    ctx.save();
    ctx.strokeStyle='rgba(136,102,68,.2)'; ctx.lineWidth=2.5;
    ctx.setLineDash([5*sc,4*sc]);
    const hs=5.8*sc, ws=6.5*sc;
    ctx.beginPath(); ctx.roundRect(cx-ws,cy-hs,ws*2,hs*2,sc); ctx.stroke();
    ctx.restore();
  },6));

  ctx.save();
  ctx.strokeStyle='rgba(68,136,204,.12)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,5*sc,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  // Vacuole
  orgs.push(new Org('vac',.3,-.2,()=>{
    const vx=cx+.3*sc, vy=cy-.2*sc;
    glow(vx,vy,3*sc,'#7dd3fc',.02,20);
    ctx.save();
    const g=gradCircle(vx,vy,3*sc,'rgba(125,211,252,.06)','rgba(56,189,248,.01)');
    ctx.fillStyle=g;
    ctx.strokeStyle='rgba(125,211,252,.1)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(vx,vy,3*sc,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();
  },3));

  O('nucleus',0,-1,1,'#8b5cf6','#6d28d9');
  O('nucleolus',.2,-.8,.3,'#7c3aed','#581c87');

  // Chloroplasts
  const clrs=[[3.2,1.8,.25],[3.8,-1.5,.22],[-3.5,2.0,.25],[-4.0,-1.0,.2],[2.0,-3.5,.22],[-1.5,-3.8,.25],[3.0,-3.0,.2]];
  for(const [gx,gy,gr] of clrs)
    orgs.push(new Org('chloro',gx,gy,()=>pill(cx+gx*sc,cy+gy*sc,.7*sc,.22*sc,'#22c55e','#16a34a'),gr));

  // Mito
  const mits=[[2.0,1.5,.25],[-2.2,-1.8,.2],[3.0,-.5,.22],[-1.5,2.5,.25]];
  for(const [mx,my,mr] of mits)
    orgs.push(new Org('mito',mx,my,()=>pill(cx+mx*sc,cy+my*sc,.6*sc,.18*sc,'#34d399','#059669'),mr));

  // RER
  const rers=[[1.0,.5],[1.8,-1.0],[-.5,1.0],[-1.5,-1.5],[.5,-2.0]];
  for(const [rx,ry] of rers)
    orgs.push(new Org('rer',rx,ry,()=>{
      const px=cx+rx*sc, py=cy+ry*sc;
      ctx.save();
      ctx.fillStyle='rgba(129,140,248,.2)'; ctx.shadowColor='rgba(129,140,248,.08)'; ctx.shadowBlur=5;
      ctx.beginPath(); ctx.ellipse(px,py,.35*sc,.04*sc,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    },.15));

  // Golgi
  for(let i=0;i<4;i++){
    const px=cx-.3*sc, py=cy+(1.5-i*.14)*sc;
    orgs.push(new Org('golgi',-.3,1.5-i*.14,()=>{
      ctx.save();
      ctx.fillStyle='rgba(251,191,36,.35)'; ctx.shadowColor='rgba(251,191,36,.08)'; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.ellipse(px,py,.2*sc,.03*sc,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    },.12));
  }

  // Free ribosomes
  ribosomes=[];
  for(let i=0;i<20;i++){
    const th=Math.acos(Math.random()*2-1), ph=Math.random()*Math.PI*2;
    const r=1.5+Math.random()*3;
    ribosomes.push([Math.sin(th)*Math.cos(ph)*r, Math.sin(th)*Math.sin(ph)*r]);
  }
}

// ─── Prokaryote ─────────────────────────────────────────
function buildProkaryote(){
  orgs=[];
  const cx=W/2, cy=H/2-10, sc=s;

  orgs.push(new Org('capsule',0,0,()=>{
    glow(cx,cy,5.5*sc,'#88aacc',.015,18);
    ctx.save();
    ctx.strokeStyle='rgba(136,170,204,.1)'; ctx.lineWidth=1.5;
    ctx.setLineDash([3*sc,5*sc]);
    ctx.beginPath(); ctx.arc(cx,cy,5.5*sc,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  },5.7));

  orgs.push(new Org('wall',0,0,()=>{
    ctx.save();
    ctx.strokeStyle='rgba(68,170,136,.12)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,4.8*sc,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  },5));

  ctx.save();
  ctx.strokeStyle='rgba(68,136,204,.08)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,4.2*sc,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  // Nucleoid
  orgs.push(new Org('nucleoid',0,.3,()=>{
    ctx.save();
    ctx.shadowColor='rgba(103,232,249,.12)'; ctx.shadowBlur=10;
    ctx.strokeStyle='rgba(103,232,249,.45)'; ctx.lineWidth=2.5;
    ctx.beginPath();
    for(let i=0;i<=40;i++){
      const t=i/40, a=t*Math.PI*3;
      const x=cx+Math.sin(a)*.6*sc*Math.sin(t*Math.PI);
      const y=cy+.3*sc+Math.cos(a*.8)*.4*sc*t;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.restore();
  },.9));

  // Plasmids
  for(let i=0;i<3;i++){
    const a=Math.random()*Math.PI*2, r=.8+Math.random()*.5;
    const px=cx+Math.cos(a)*r*sc, py=cy+.3*sc+Math.sin(a)*r*sc;
    orgs.push(new Org('plasmid',Math.cos(a)*r,.3+Math.sin(a)*r,()=>{
      ctx.save();
      ctx.strokeStyle='rgba(110,231,183,.35)'; ctx.lineWidth=2; ctx.shadowColor='rgba(110,231,183,.08)'; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.arc(px,py,.1*sc,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    },.15));
  }

  // Ribosomes
  ribosomes=[];
  for(let i=0;i<15;i++){
    const th=Math.acos(Math.random()*2-1), ph=Math.random()*Math.PI*2;
    const r=.8+Math.random()*2.8;
    ribosomes.push([Math.sin(th)*Math.cos(ph)*r, Math.sin(th)*Math.sin(ph)*r]);
  }

  // Flagellum
  orgs.push(new Org('flag',0,4.5,()=>{
    ctx.save();
    ctx.strokeStyle='rgba(212,212,216,.25)'; ctx.lineWidth=2.5; ctx.shadowColor='rgba(212,212,216,.04)'; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.moveTo(cx,cy+4*sc);
    for(let i=0;i<=30;i++){
      const t=i/30;
      ctx.lineTo(cx+Math.sin(t*12)*.3*sc*(1-t*.4), cy+4*sc+t*5*sc);
    }
    ctx.stroke();
    ctx.restore();
  },.5));

  // Pili
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2, t2=Math.acos(Math.random()*2-1);
    const x=cx+Math.sin(t2)*Math.cos(a)*4.2*sc, y=cy+Math.sin(t2)*Math.sin(a)*4.2*sc;
    ctx.save();
    ctx.strokeStyle='rgba(168,162,158,.12)'; ctx.lineWidth=1.5;
    const nx=x-cx, ny=y-cy, len=.5*sc, d=Math.sqrt(nx*nx+ny*ny);
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+nx/d*len, y+ny/d*len); ctx.stroke();
    ctx.restore();
  }
  orgs.push(new Org('pilus',4.2,0,()=>{},.5));
}

// ─── Labels ─────────────────────────────────────────────
function drawLabels(){
  for(const o of orgs){
    const d=INFO[o.id]; if(!d) continue;
    const px=o.x(), py=o.y(), rr=o.hitR*s;
    const isSel=selected===o.id;
    // Connecting line
    ctx.save();
    ctx.strokeStyle=isSel?d[2]:'rgba(255,255,255,.08)'; ctx.lineWidth=isSel?1.5:1; ctx.globalAlpha=isSel?1:.4;
    ctx.setLineDash([2,3]); ctx.beginPath(); ctx.moveTo(px,py+rr+2); ctx.lineTo(px,py+rr+16); ctx.stroke();
    ctx.restore();
    // Name
    ctx.save();
    ctx.fillStyle=isSel?d[2]:'rgba(255,255,255,.2)'; ctx.font=isSel?`bold ${11.5}px Segoe UI,sans-serif`:`${10.5}px Segoe UI,sans-serif`;
    ctx.textAlign='center'; ctx.fillText(d[0],px,py+rr+26);
    ctx.restore();
  }
}

// ─── Main Loop ──────────────────────────────────────────
let frame=0;
function draw(){
  frame++;
  const cx=W/2, cy=H/2-10;

  drawBg();

  if(rebuild){
    if(currentType==='animal') buildAnimal();
    else if(currentType==='plant') buildPlant();
    else buildProkaryote();
    rebuild=false;
  }

  // Draw organelles
  for(const o of orgs){
    ctx.save();
    if(selected===o.id){
      ctx.shadowColor='rgba(255,255,255,.15)'; ctx.shadowBlur=18;
    }
    o.draw();
    ctx.restore();
  }

  // Free ribosomes
  const cx=W/2, cy=H/2-10;
  for(const [rx,ry] of ribosomes){
    ctx.fillStyle='rgba(253,230,138,.2)';
    ctx.beginPath(); ctx.arc(cx+rx*s,cy+ry*s,1.5,0,Math.PI*2); ctx.fill();
  }

  drawLabels();
  requestAnimationFrame(draw);
}

// ─── Click ──────────────────────────────────────────────
c.addEventListener('click',(e)=>{
  const rect=c.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const hint=document.getElementById('hint');
  const nameEl=document.getElementById('pname');
  const descEl=document.getElementById('pdesc');
  let found=null;
  for(const o of orgs){
    if(o.hit(mx,my)){found=o.id;break;}
  }
  selected=found;
  if(found && INFO[found]){
    hint.style.display='none';
    const col=INFO[found][2];
    nameEl.style.background=`linear-gradient(135deg,${col},rgba(255,255,255,.6))`;
    nameEl.style.webkitBackgroundClip='text'; nameEl.style.webkitTextFillColor='transparent';
    nameEl.textContent=INFO[found][0];
    descEl.textContent=INFO[found][1];
  }else{
    hint.style.display='';
    nameEl.textContent=''; descEl.textContent='';
  }
});

// ─── Tabs ───────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentType=btn.dataset.cell;
    rebuild=true;
    selected=null;
    document.getElementById('hint').style.display='';
    document.getElementById('pname').textContent='';
    document.getElementById('pdesc').textContent='';
  });
});

// ─── Start ──────────────────────────────────────────────
resize();
draw();
</script>
