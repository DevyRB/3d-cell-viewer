<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Viewer 2D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:#070714;overflow:hidden;color:#fff;
  user-select:none
}
canvas{display:block;width:100vw;height:100vh}
.top-bar{
  position:fixed;top:0;left:0;width:100%;z-index:20;pointer-events:none;
  padding:16px 24px;
  background:linear-gradient(180deg,rgba(7,7,20,0.85) 0%,transparent 100%);
}
.top-bar>*{pointer-events:auto}
.top-bar h1{
  font-size:20px;font-weight:700;display:inline;margin-right:28px;
  background:linear-gradient(135deg,#8ab4ff,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.tab-btn{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.45);padding:7px 20px;border-radius:20px;
  cursor:pointer;font-size:13px;transition:.25s;margin-right:8px;font-weight:500
}
.tab-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.tab-btn.active{
  background:linear-gradient(135deg,#4a7cf7,#6c63ff);border-color:transparent;color:#fff;
  box-shadow:0 4px 20px rgba(74,124,247,0.25)
}
.info-panel{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:20;
  background:rgba(10,10,30,0.9);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.06);border-radius:16px;
  padding:14px 24px;max-width:500px;width:calc(100%-40px);text-align:center;
  pointer-events:none;transition:all .4s cubic-bezier(.4,0,.2,1)
}
.info-panel .hint{font-size:12px;color:rgba(255,255,255,0.2)}
.info-panel .hint span{display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.info-panel .name{font-size:18px;font-weight:600;margin-bottom:2px}
.info-panel .desc{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.5}
@media(max-width:600px){
  .top-bar{padding:12px 16px}
  .top-bar h1{font-size:16px;display:block;margin-bottom:6px}
  .tab-btn{font-size:11px;padding:5px 14px}
  .info-panel{bottom:16px;padding:12px 16px}
  .info-panel .name{font-size:15px}
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>✦ Cell Viewer</h1>
  <button class="tab-btn active" data-cell="animal">Animal</button>
  <button class="tab-btn" data-cell="plant">Plant</button>
  <button class="tab-btn" data-cell="prokaryote">Prokaryote</button>
</div>

<div class="info-panel" id="panel">
  <div class="hint"><span>👆</span> คลิกที่ออร์แกเนลล์</div>
  <div class="name" id="pname"></div>
  <div class="desc" id="pdesc"></div>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H;

function resize(){
  W = window.innerWidth; H = window.innerHeight;
  c.width = W * devicePixelRatio;
  c.height = H * devicePixelRatio;
  c.style.width = W + 'px';
  c.style.height = H + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener('resize', resize);
resize();

// ─── Organelle Info ─────────────────────────────────────
const info = {
  membrane: ['Cell Membrane','เยื่อหุ้มเซลล์ — เยื่อเลือกผ่านควบคุมการเข้าออกของสาร'],
  wall: ['Cell Wall','ผนังเซลล์ — โครงสร้างแข็งนอกเยื่อหุ้ม ให้ความแข็งแรง'],
  capsule: ['Capsule','แคปซูล — ชั้นเมือกหนาหุ้มแบคทีเรีย ป้องกันและยึดเกาะ'],
  nucleus: ['Nucleus','นิวเคลียส — ศูนย์กลางควบคุมเซลล์ บรรจุ DNA','#a78bfa'],
  nucleolus: ['Nucleolus','นิวคลีโอลัส — สร้างไรโบโซม อยู่ภายในนิวเคลียส','#7c3aed'],
  mito: ['Mitochondrion','ไมโทคอนเดรีย — แหล่งสร้างพลังงาน ATP','#34d399'],
  chloro: ['Chloroplast','คลอโรพลาสต์ — แหล่งสังเคราะห์ด้วยแสง มีคลอโรฟิลล์','#22c55e'],
  rer: ['Rough ER','ER แบบขรุขระ — สังเคราะห์โปรตีน มีไรโบโซมเกาะ','#818cf8'],
  ser: ['Smooth ER','ER แบบเรียบ — สังเคราะห์ไขมันและขับสารพิษ','#7dd3fc'],
  golgi: ['Golgi Apparatus','กอลจิ — แปรรูปและบรรจุโปรตีนส่งออก','#fbbf24'],
  ribo: ['Ribosome','ไรโบโซม — สร้างโปรตีนจากกรดอะมิโน','#fde68a'],
  lyso: ['Lysosome','ไลโซโซม — ย่อยสลายของเสียและสิ่งแปลกปลอม','#f87171'],
  vac: ['Vacuole','แวคิวโอล — เก็บน้ำและสารต่างๆ พืชมีขนาดใหญ่','#7dd3fc'],
  centro: ['Centrosome','เซนโทรโซม — ช่วยในการแบ่งเซลล์','#fb923c'],
  nucleoid: ['Nucleoid','นิวคลีออยด์ — DNA วงกลมในโพรคาริโอต ไม่มีเยื่อหุ้ม','#67e8f9'],
  plasmid: ['Plasmid','พลาสมิด — DNA วงกลมเล็กๆ นอกโครโมโซม','#6ee7b7'],
  flag: ['Flagellum','แฟลเจลลัม — หางใช้เคลื่อนที่ของแบคทีเรีย','#d4d4d8'],
  pilus: ['Pilus','ไพลัส — ขนเล็กๆ ใช้ยึดเกาะและถ่ายโอน DNA','#a8a29e'],
};

// ─── Drawing Utils ──────────────────────────────────────
function grad(x,y,r,c1,c2){
  const g = ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  g.addColorStop(0,c1);
  g.addColorStop(1,c2);
  return g;
}

function drawGlow(x,y,r,color,alpha=0.15,blur=20){
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.fillStyle = color;
  ctx.globalAlpha = alpha;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCircle(x,y,r,c1,c2,shadow=true){
  if(shadow) drawGlow(x,y,r,c2||c1,0.12,15);
  ctx.save();
  const g = grad(x,y,r,c1,c2||c1);
  ctx.fillStyle = g;
  ctx.shadowColor = shadow ? 'rgba(0,0,0,0.3)' : 'transparent';
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPill(x,y,w,h,c1,c2,r){
  r=r||h/2;
  ctx.save();
  const g = ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,c1); g.addColorStop(1,c2||c1);
  ctx.fillStyle = g;
  ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.roundRect(x-w/2,y-h/2,w,h,r); ctx.fill();
  ctx.restore();
}

function drawHighlight(x,y,r,color){
  ctx.save();
  const g = ctx.createRadialGradient(x-r*0.25,y-r*0.25,0,x,y,r*0.6);
  g.addColorStop(0, 'rgba(255,255,255,0.25)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x,y,r*0.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─── Organelle base class ──────────────────────────────
class Org {
  constructor(id,x,y,drawFn,region){
    this.id=id; this.x=x; this.y=y; this.draw=drawFn; this.region=region;
  }
  hit(mx,my){
    if(!this.region) return false;
    const dx=mx-this.region.x, dy=my-this.region.y;
    return dx*dx+dy*dy <= (this.region.r||15)*(this.region.r||15);
  }
}

// ─── Background ─────────────────────────────────────────
let particles = [];
function initParticles(){
  particles=[];
  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
      r:Math.random()*1.5+0.5, a:Math.random()*0.3+0.05
    });
  }
}
initParticles();

function drawBg(){
  // Deep space gradient
  const g = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  g.addColorStop(0,'#0f0f2a'); g.addColorStop(0.5,'#08081a'); g.addColorStop(1,'#04040c');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Particles
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>W) p.vx*=-1;
    if(p.y<0||p.y>H) p.vy*=-1;
    ctx.fillStyle=`rgba(255,255,255,${p.a})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
}

// ─── Cell Data ──────────────────────────────────────────
let currentType = 'animal';
let orgs = [];
let selectedId = null;

// ─── Animal Cell ────────────────────────────────────────
function buildAnimal(cx,cy,s){
  orgs=[];
  const O=(id,x,y,r,color,color2,labelOff)=>new Org(id,cx+x*s,cy+y*s,(c)=>{
    const px=cx+x*s, py=cy+y*s, rr=r*s;
    drawCircle(px,py,rr,color,color2);
    drawHighlight(px,py,rr,color);
    if(labelOff){
      ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font=`${11*s}px 'Segoe UI',sans-serif`;
      ctx.textAlign='center'; ctx.fillText(info[id][0],px,py+rr+16*s);
    }
  },{x:cx+x*s,y:cy+y*s,r:r*s});

  // Membrane glow
  orgs.push(new Org('membrane',cx,cy,()=>{
    drawGlow(cx,cy,5.2*s,'#4488cc',0.06,30);
    ctx.save();
    ctx.strokeStyle='rgba(68,136,204,0.2)'; ctx.lineWidth=1.5;
    ctx.setLineDash([4*s,6*s]); ctx.beginPath(); ctx.arc(cx,cy,5*s,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  },{x:cx,y:cy,r:5.2*s}));

  // Nucleus
  orgs.push(O('nucleus',0.2,0.3,1.4*s,'#8b5cf6','#6d28d9',false));
  orgs.push(O('nucleolus',0.5,0.5,0.4*s,'#7c3aed','#581c87',false));

  // Mitochondria
  const mpos = [[2.5,1.0,0.3],[3.0,-1.2,0.2],[-1.5,2.8,0.25],[3.2,0.5,0.3],[-3.0,-1.5,0.2],[-0.5,-3.0,0.25]];
  for(const [mx,my,mr] of mpos){
    orgs.push(new Org('mito',cx+mx*s,cy+my*s,(c)=>{
      drawPill(cx+mx*s,cy+my*s,0.8*s,0.25*s,'#34d399','#059669',0.12*s);
    },{x:cx+mx*s,y:cy+my*s,r:0.15*s}));
  }

  // Rough ER
  const rerPos = [[1.2,1.5],[2.0,-0.5],[-1.0,1.8],[-1.8,-1.2],[2.5,1.8],[-2.0,-2.0],[1.5,-1.8],[0.5,2.5]];
  for(const [rx,ry] of rerPos){
    const px=cx+rx*s, py=cy+ry*s;
    orgs.push(new Org('rer',px,py,(c)=>{
      ctx.save();
      const w=0.7*s, h=0.1*s;
      const g=ctx.createLinearGradient(px,py-h/2,px,py+h/2);
      g.addColorStop(0,'#818cf8'); g.addColorStop(1,'#6366f1');
      ctx.fillStyle=g; ctx.shadowColor='rgba(129,140,248,0.15)'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.ellipse(px,py,w/2,h/2,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
      // dots on ER
      for(let i=0;i<4;i++){
        ctx.fillStyle='rgba(253,230,138,0.5)';
        ctx.beginPath(); ctx.arc(px+(Math.random()-0.5)*w*0.7,py+(Math.random()-0.5)*h*0.5,1.5,0,Math.PI*2); ctx.fill();
      }
    },{x:px,y:py,r:0.15*s}));
  }

  // Smooth ER
  const serPos = [[2.8,-0.2],[-2.5,1.2],[1.0,-2.2],[-1.2,-2.5],[-2.8,-0.8]];
  for(const [sx,sy] of serPos){
    const px=cx+sx*s, py=cy+sy*s;
    orgs.push(new Org('ser',px,py,(c)=>{
      ctx.save();
      ctx.strokeStyle='rgba(125,211,252,0.45)'; ctx.lineWidth=2.5;
      ctx.shadowColor='rgba(125,211,252,0.1)'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(px,py,0.25*s,0,Math.PI*1.5); ctx.stroke();
      ctx.restore();
    },{x:px,y:py,r:0.15*s}));
  }

  // Golgi
  for(let i=0;i<5;i++){
    const px=cx+(-0.5*s), py=cy+(1.2-i*0.2)*s;
    orgs.push(new Org('golgi',px,py,(c)=>{
      const w=0.6*s-i*0.04*s, h=0.06*s;
      ctx.save();
      const g=ctx.createLinearGradient(px,py-h,px,py+h);
      g.addColorStop(0,'#fbbf24'); g.addColorStop(1,'#d97706');
      ctx.fillStyle=g; ctx.shadowColor='rgba(251,191,36,0.15)'; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.ellipse(px,py,w/2,h/2,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    },{x:px,y:py,r:0.12*s}));
  }

  // Lysosomes
  for(let i=0;i<3;i++){
    const px=cx+(3.2+Math.random()*0.4)*s*(Math.random()>0.5?1:-1);
    const py=cy+(Math.random()-0.5)*2*s;
    const rr=0.12*s+Math.random()*0.04*s;
    orgs.push(new Org('lyso',px,py,(c)=>{
      drawCircle(px,py,rr,'#f87171','#dc2626');
    },{x:px,y:py,r:rr}));
  }

  // Centrosome
  const cpx=cx-1.8*s, cpy=cy-1.2*s;
  orgs.push(new Org('centro',cpx,cpy,(c)=>{
    ctx.save();
    ctx.strokeStyle='#fb923c'; ctx.lineWidth=2;
    ctx.shadowColor='rgba(251,146,60,0.2)'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.moveTo(cpx-0.2*s,cpy); ctx.lineTo(cpx+0.2*s,cpy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cpx,cpy-0.2*s); ctx.lineTo(cpx,cpy+0.2*s); ctx.stroke();
    ctx.restore();
  },{x:cpx,y:cpy,r:0.2*s}));

  // Ribosomes (decorative)
  for(let i=0;i<30;i++){
    const th=Math.acos(Math.random()*2-1), ph=Math.random()*Math.PI*2;
    const r=(1.5+Math.random()*3)*s;
    const px=cx+Math.sin(th)*Math.cos(ph)*r, py=cy+Math.sin(th)*Math.sin(ph)*r;
    ctx.fillStyle='rgba(253,230,138,0.3)';
    ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2); ctx.fill();
  }
}

// ─── Plant Cell ─────────────────────────────────────────
function buildPlant(cx,cy,s){
  orgs=[];
  const O=(id,x,y,r,color,color2)=>new Org(id,cx+x*s,cy+y*s,(c)=>{
    const px=cx+x*s, py=cy+y*s, rr=r*s;
    drawCircle(px,py,rr,color,color2);
    drawHighlight(px,py,rr,color);
  },{x:px,y:py,r:rr});

  // Cell wall
  orgs.push(new Org('wall',cx,cy,()=>{
    ctx.save();
    ctx.strokeStyle='rgba(136,102,68,0.25)'; ctx.lineWidth=2.5;
    ctx.setLineDash([6*s,4*s]);
    const hs=5.8*s, ws=6.5*s;
    ctx.beginPath(); ctx.roundRect(cx-ws,cy-hs,ws*2,hs*2,1.2*s); ctx.stroke();
    ctx.restore();
  },{x:cx,y:cy,r:6*s}));

  // Membrane
  ctx.save();
  ctx.strokeStyle='rgba(68,136,204,0.15)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,5*s,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  // Vacuole
  const vx=cx+0.3*s, vy=cy-0.2*s;
  orgs.push(new Org('vac',vx,vy,()=>{
    drawGlow(vx,vy,3*s,'#7dd3fc',0.03,25);
    ctx.save();
    const g=grad(vx,vy,3*s,'rgba(125,211,252,0.08)','rgba(56,189,248,0.02)');
    ctx.fillStyle=g;
    ctx.strokeStyle='rgba(125,211,252,0.15)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(vx,vy,3*s,0,Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  },{x:vx,y:vy,r:3*s}));

  // Nucleus
  O('nucleus',0,-1,1.0*s,'#8b5cf6','#6d28d9');
  O('nucleolus',0.2,-0.8,0.3*s,'#7c3aed','#581c87');

  // Chloroplasts
  const cpos = [[3.2,1.8,0.2],[3.8,-1.5,0.15],[-3.5,2.0,0.2],[-4.0,-1.0,0.18],[2.0,-3.5,0.15],[-1.5,-3.8,0.2],[3.0,-3.0,0.18]];
  for(const [gx,gy,gr] of cpos){
    const px=cx+gx*s, py=cy+gy*s;
    orgs.push(new Org('chloro',px,py,(c)=>{
      drawPill(px,py,0.7*s,0.2*s,'#22c55e','#16a34a',0.1*s);
      ctx.fillStyle='rgba(255,255,255,0.1)';
      ctx.beginPath(); ctx.ellipse(px-0.1*s,py,0.1*s,0.06*s,0,0,Math.PI*2); ctx.fill();
    },{x:px,y:py,r:0.12*s}));
  }

  // Mitochondria
  const mpos = [[2.0,1.5,0.2],[-2.2,-1.8,0.15],[3.0,-0.5,0.18],[-1.5,2.5,0.2]];
  for(const [mx,my,mr] of mpos){
    orgs.push(new Org('mito',cx+mx*s,cy+my*s,(c)=>{
      drawPill(cx+mx*s,cy+my*s,0.65*s,0.2*s,'#34d399','#059669',0.1*s);
    },{x:cx+mx*s,y:cy+my*s,r:0.12*s}));
  }

  // Rough ER
  const rerPos = [[1.0,0.5],[1.8,-1.0],[-0.5,1.0],[-1.5,-1.5],[0.5,-2.0]];
  for(const [rx,ry] of rerPos){
    const px=cx+rx*s, py=cy+ry*s;
    orgs.push(new Org('rer',px,py,(c)=>{
      ctx.save();
      ctx.fillStyle='rgba(129,140,248,0.25)'; ctx.shadowColor='rgba(129,140,248,0.1)'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.ellipse(px,py,0.35*s,0.05*s,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    },{x:px,y:py,r:0.1*s}));
  }

  // Golgi
  for(let i=0;i<4;i++){
    const px=cx-0.3*s, py=cy+(1.5-i*0.15)*s;
    orgs.push(new Org('golgi',px,py,(c)=>{
      const w=0.4*s-i*0.04*s, h=0.05*s;
      ctx.save();
      ctx.fillStyle='rgba(251,191,36,0.4)'; ctx.shadowColor='rgba(251,191,36,0.1)'; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.ellipse(px,py,w/2,h/2,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    },{x:px,y:py,r:0.1*s}));
  }

  // Ribosomes
  for(let i=0;i<20;i++){
    const th=Math.acos(Math.random()*2-1), ph=Math.random()*Math.PI*2;
    const r=(1.5+Math.random()*3)*s;
    const px=cx+Math.sin(th)*Math.cos(ph)*r, py=cy+Math.sin(th)*Math.sin(ph)*r;
    ctx.fillStyle='rgba(253,230,138,0.2)';
    ctx.beginPath(); ctx.arc(px,py,1.2,0,Math.PI*2); ctx.fill();
  }
}

// ─── Prokaryote ─────────────────────────────────────────
function buildProkaryote(cx,cy,s){
  orgs=[];

  // Capsule
  orgs.push(new Org('capsule',cx,cy,()=>{
    drawGlow(cx,cy,5.5*s,'#88aacc',0.02,20);
    ctx.save();
    ctx.strokeStyle='rgba(136,170,204,0.12)'; ctx.lineWidth=1.5;
    ctx.setLineDash([3*s,5*s]); ctx.beginPath(); ctx.arc(cx,cy,5.5*s,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  },{x:cx,y:cy,r:5.5*s}));

  // Cell wall
  orgs.push(new Org('wall',cx,cy,()=>{
    ctx.save();
    ctx.strokeStyle='rgba(68,170,136,0.15)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,4.8*s,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  },{x:cx,y:cy,r:4.8*s}));

  // Membrane
  ctx.save();
  ctx.strokeStyle='rgba(68,136,204,0.1)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,4.2*s,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  // Nucleoid DNA
  const dx=cx, dy=cy+0.3*s;
  orgs.push(new Org('nucleoid',dx,dy,()=>{
    ctx.save();
    ctx.shadowColor='rgba(103,232,249,0.15)'; ctx.shadowBlur=12;
    ctx.strokeStyle='rgba(103,232,249,0.5)'; ctx.lineWidth=2.5;
    ctx.beginPath();
    for(let i=0;i<=40;i++){
      const t=i/40, a=t*Math.PI*3;
      const x=dx+Math.sin(a)*0.6*s*Math.sin(t*Math.PI);
      const y=dy+Math.cos(a*0.8)*0.4*s*t;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.restore();
  },{x:dx,y:dy,r:0.8*s}));

  // Plasmids
  for(let i=0;i<3;i++){
    const a=Math.random()*Math.PI*2, r=0.8+Math.random()*0.5;
    const px=cx+Math.cos(a)*r*s, py=cy+Math.sin(a)*r*s;
    orgs.push(new Org('plasmid',px,py,(c)=>{
      ctx.save();
      ctx.strokeStyle='rgba(110,231,183,0.4)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(px,py,0.1*s,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    },{x:px,y:py,r:0.12*s}));
  }

  // Ribosomes
  for(let i=0;i<18;i++){
    const th=Math.acos(Math.random()*2-1), ph=Math.random()*Math.PI*2;
    const r=(0.8+Math.random()*2.8)*s;
    const px=cx+Math.sin(th)*Math.cos(ph)*r, py=cy+Math.sin(th)*Math.sin(ph)*r;
    ctx.fillStyle='rgba(253,230,138,0.25)';
    ctx.beginPath(); ctx.arc(px,py,1.8,0,Math.PI*2); ctx.fill();
    // Make some clickable
    if(i<4) orgs.push(new Org('ribo',px,py,()=>{}, {x:px,y:py,r:2}));
  }

  // Flagellum
  const fx=cx, fy=cy;
  orgs.push(new Org('flag',fx-2*s,fy+4.5*s,()=>{
    ctx.save();
    ctx.strokeStyle='rgba(212,212,216,0.3)'; ctx.lineWidth=2.5;
    ctx.shadowColor='rgba(212,212,216,0.05)'; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.moveTo(cx,cy+4*s);
    for(let i=0;i<=30;i++){
      const t=i/30;
      ctx.lineTo(cx+Math.sin(t*12)*0.3*s*(1-t*0.4), cy+4*s+t*5*s);
    }
    ctx.stroke();
    ctx.restore();
  },{x:cx,y:cy+7*s,r:0.3*s}));

  // Pili
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2, t=Math.acos(Math.random()*2-1);
    const x=cx+Math.sin(t)*Math.cos(a)*4.2*s, y=cy+Math.sin(t)*Math.sin(a)*4.2*s;
    ctx.save();
    ctx.strokeStyle='rgba(168,162,158,0.15)'; ctx.lineWidth=1.5;
    const nx=x-cx, ny=y-cy, len=0.5*s;
    const d=Math.sqrt(nx*nx+ny*ny);
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+nx/d*len, y+ny/d*len); ctx.stroke();
    ctx.restore();
  }
  const pilusIdx=orgs.length;
  orgs.push(new Org('pilus',cx+4.2*s,cy,()=>{}, {x:cx+4.2*s,y:cy,r:0.5*s}));
}

// ─── Main Draw ──────────────────────────────────────────
function draw(){
  const cx = W/2, cy = H/2 - 10;
  const s = Math.min(W,H) / 18;

  drawBg();

  // Label
  const titles = {animal:'Animal Cell',plant:'Plant Cell',prokaryote:'Prokaryotic Cell'};
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.font=`bold ${18*s/6}px 'Segoe UI',sans-serif`;
  ctx.textAlign='center'; ctx.fillText(titles[currentType],cx,cy-5.8*s);
  ctx.restore();

  // Build if empty
  if(orgs.length===0){
    if(currentType==='animal') buildAnimal(cx,cy,s);
    else if(currentType==='plant') buildPlant(cx,cy,s);
    else buildProkaryote(cx,cy,s);
  }

  // Draw all organelles
  for(const o of orgs){
    ctx.save();
    if(selectedId===o.id){
      ctx.shadowColor='rgba(255,255,255,0.3)'; ctx.shadowBlur=20;
    }
    o.draw();
    ctx.restore();
  }

  // Draw labels for clickable + selected
  for(const o of orgs){
    const d=info[o.id];
    if(!d) continue;
    const col=d[2]||'#8ab4ff';
    const px=o.x, py=o.y;

    // Name label below
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.font=`10px 'Segoe UI',sans-serif`;
    ctx.textAlign='center';
    const rr = o.region ? o.region.r*1.2 : 10;
    ctx.fillText(d[0], px, py+rr+12);

    // Label color dot
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.arc(px,py-rr-4,2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  requestAnimationFrame(draw);
}

// ─── Click ──────────────────────────────────────────────
c.addEventListener('click',(e)=>{
  const rect=c.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  selectedId=null;
  for(const o of orgs){
    if(o.hit(mx,my)){selectedId=o.id;break;}
  }
  const panel=document.getElementById('panel');
  const hint=panel.querySelector('.hint');
  const nameEl=document.getElementById('pname');
  const descEl=document.getElementById('pdesc');
  if(selectedId && info[selectedId]){
    hint.style.display='none';
    const col=info[selectedId][2]||'#8ab4ff';
    nameEl.style.background=`linear-gradient(135deg,${col},rgba(255,255,255,0.6))`;
    nameEl.style.webkitBackgroundClip='text'; nameEl.style.webkitTextFillColor='transparent';
    nameEl.textContent=info[selectedId][0];
    descEl.textContent=info[selectedId][1];
  }else{
    hint.style.display='';
    nameEl.textContent=''; descEl.textContent='';
  }
});

// ─── Tab ────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentType=btn.dataset.cell;
    orgs=[];
    document.getElementById('panel').querySelector('.hint').style.display='';
    document.getElementById('pname').textContent='';
    document.getElementById('pdesc').textContent='';
    selectedId=null;
  });
});

draw();
</script>
</body>
</html>
